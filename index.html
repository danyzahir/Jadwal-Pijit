<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Jadwal Pijat </title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #e60000;
            --primary-hover: #cc0000;
            --primary-gradient: linear-gradient(135deg, #ff1a1a, #e60000);
            --bg-gradient: linear-gradient(180deg, #fff5f5 0%, #ffffff 100%);
            --white: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --shadow-soft: 0 10px 30px rgba(230, 0, 0, 0.05);
            --shadow-elevated: 0 15px 35px rgba(230, 0, 0, 0.1);
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 400;
        }

        /* Main Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 0.8fr 1fr 1fr;
            gap: 20px;
            align-items: start;
        }

        @media (max-width: 1200px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Card Styling */
        .card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
            border: 1px solid rgba(230, 0, 0, 0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-elevated);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1.5px solid #eee;
            background: #fafafa;
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(230, 0, 0, 0.1);
        }

        .form-control:read-only {
            background: #f1f1f1;
            cursor: not-allowed;
        }

        /* Button Styling */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--primary-gradient);
            color: var(--white);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(230, 0, 0, 0.3);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* Table Styling */
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-select {
            padding: 8px 15px;
            border-radius: 30px;
            border: 1.5px solid #eee;
            outline: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-select:focus {
            border-color: var(--primary-color);
        }

        .table-container {
            overflow-x: auto;
            border-radius: var(--radius-md);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #fdf2f2;
            padding: 15px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f5f5f5;
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #fffafa;
        }

        .btn-delete {
            background: #fff;
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-delete:hover {
            background: #ff4d4d;
            color: #fff;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }

        .empty-state.active {
            display: block;
        }

        .empty-state-icon {
            font-size: 3rem;
            color: #ddd;
            margin-bottom: 15px;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Notification Styling */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 15px 25px;
            border-radius: var(--radius-md);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.error {
            background: var(--primary-color);
        }

        /* Custom Time Picker Selects */
        .time-picker {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .time-picker select {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-md);
            border: 1.5px solid #eee;
            background: #fafafa;
            cursor: pointer;
            transition: var(--transition);
        }

        .time-picker select:focus {
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 4px rgba(230, 0, 0, 0.1);
        }

        .time-picker span {
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Drag and Drop Styles */
        tr[draggable="true"] {
            cursor: move;
            user-select: none;
        }

        .dragging {
            opacity: 0.5;
            background: #fdf2f2 !important;
            border: 2px dashed var(--primary-color);
        }

        .drop-zone-active {
            box-shadow: 0 0 15px rgba(230, 0, 0, 0.2);
            border: 2px dashed var(--primary-color) !important;
            transform: scale(1.02);
            transition: var(--transition);
        }

        .badge-fixed {
            background: #4caf50;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        @media (max-width: 576px) {
            body {
                padding: 15px;
            }

            header h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 20px;
            }

            .table-header {
                flex-direction: column;
                align-items: stretch;
            }

            td,
            th {
                padding: 12px 10px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>

    <div id="notification" class="notification">
        <span id="notif-message"></span>
    </div>

    <div class="container">
        <header>
            <h1>Jadwal Pijat</h1>
        </header>

        <main class="dashboard-grid">
            <!-- Form Input Section -->
            <section class="card">
                <h2 class="card-title">Input Jadwal Baru</h2>
                <form id="scheduleForm">
                    <div class="form-group">
                        <label for="customerName">Nama Pelanggan</label>
                        <input type="text" id="customerName" class="form-control" placeholder="Masukkan nama pelanggan"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="scheduleDay">Pilih Hari</label>
                        <select id="scheduleDay" class="form-control" required>
                            <option value="" disabled selected>Pilih hari</option>
                            <option value="Senin">Senin</option>
                            <option value="Selasa">Selasa</option>
                            <option value="Rabu">Rabu</option>
                            <option value="Kamis">Kamis</option>
                            <option value="Jumat">Jumat</option>
                            <option value="Sabtu">Sabtu</option>
                            <option value="Minggu">Minggu</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Jam Pijit (Format 24 Jam)</label>
                        <div class="time-picker">
                            <select id="scheduleHour" class="form-control" required>
                                <option value="" disabled selected>Jam</option>
                                <!-- Hours 00-23 will be injected -->
                            </select>
                            <span>:</span>
                            <select id="scheduleMinute" class="form-control" required>
                                <option value="" disabled selected>Menit</option>
                                <!-- Minutes 00, 15, 30, 45 or full range -->
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn">
                        <span>Simpan Jadwal</span>
                    </button>
                </form>
            </section>

            <!-- Riwayat Jadwal Section -->
            <section class="card drop-zone" id="historyDropZone" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'history')">
                <div class="table-header">
                    <h2 class="card-title" style="margin-bottom: 0;">Riwayat Jadwal</h2>
                    <div class="filter-group">
                        <label for="dayFilter" style="font-size: 0.8rem; color: var(--text-muted);">Filter:</label>
                        <select id="dayFilter" class="filter-select">
                            <option value="all">Semua</option>
                            <option value="Senin">Senin</option>
                            <option value="Selasa">Selasa</option>
                            <option value="Rabu">Rabu</option>
                            <option value="Kamis">Kamis</option>
                            <option value="Jumat">Jumat</option>
                            <option value="Sabtu">Sabtu</option>
                            <option value="Minggu">Minggu</option>
                        </select>
                    </div>
                </div>

                <div class="table-container">
                    <table id="scheduleTable">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Nama</th>
                                <th>Hari</th>
                                <th>Jam</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleBody">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                    <div id="emptyState" class="empty-state">
                        <p>Tarik jadwal ke sini</p>
                    </div>
                </div>
            </section>

            <!-- Daftar Fix Pijit Section -->
            <section class="card drop-zone" id="fixedDropZone" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'fixed')">
                <div class="table-header">
                    <h2 class="card-title" style="margin-bottom: 0;">Daftar Fix Pijit</h2>
                    <span class="badge-fixed">Confirmed</span>
                </div>

                <div class="table-container">
                    <table id="fixedTable">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Nama</th>
                                <th>Hari</th>
                                <th>Jam</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="fixedBody">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                    <div id="fixedEmptyState" class="empty-state">
                        <p>Tarik jadwal ke sini (Fix)</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Constants & State
        const STORAGE_KEY = 'relaxation_schedules';
        const STORAGE_KEY_FIXED = 'relaxation_fixed_schedules';
        
        let schedules = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let fixedSchedules = JSON.parse(localStorage.getItem(STORAGE_KEY_FIXED)) || [];

        // DOM Elements
        const form = document.getElementById('scheduleForm');
        const customerName = document.getElementById('customerName');
        const scheduleDay = document.getElementById('scheduleDay');
        const scheduleHour = document.getElementById('scheduleHour');
        const scheduleMinute = document.getElementById('scheduleMinute');
        const scheduleBody = document.getElementById('scheduleBody');
        const fixedBody = document.getElementById('fixedBody');
        const emptyState = document.getElementById('emptyState');
        const fixedEmptyState = document.getElementById('fixedEmptyState');
        const dayFilter = document.getElementById('dayFilter');
        const notification = document.getElementById('notification');
        const notifMessage = document.getElementById('notif-message');

        // Initialize App
        function init() {
            populateTimeSelects();
            renderSchedules();
        }

        // Populate Hour and Minute Selects
        function populateTimeSelects() {
            // Hours 00-23
            for (let i = 0; i < 24; i++) {
                const hour = i.toString().padStart(2, '0');
                const option = document.createElement('option');
                option.value = hour;
                option.textContent = hour;
                scheduleHour.appendChild(option);
            }
            // Minutes 00, 05, 10, ... 55
            for (let i = 0; i < 60; i += 5) {
                const min = i.toString().padStart(2, '0');
                const option = document.createElement('option');
                option.value = min;
                option.textContent = min;
                scheduleMinute.appendChild(option);
            }
        }

        // --- Drag & Drop Core Logic ---
        let draggedItemId = null;
        let sourceList = null;

        function handleDragStart(e, id, list) {
            draggedItemId = id;
            sourceList = list;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            // Set data for better compatibility
            e.dataTransfer.setData('text/plain', id);
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.card').forEach(c => c.classList.remove('drop-zone-active'));
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drop-zone-active');
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDrop(e, targetList) {
            e.preventDefault();
            e.currentTarget.classList.remove('drop-zone-active');

            if (sourceList === targetList) return;

            moveSchedule(draggedItemId, sourceList, targetList);
        }

        function moveSchedule(id, from, to) {
            let item;
            if (from === 'history') {
                const index = schedules.findIndex(s => s.id === id);
                if (index === -1) return;
                item = schedules.splice(index, 1)[0];
                fixedSchedules.push(item);
            } else {
                const index = fixedSchedules.findIndex(s => s.id === id);
                if (index === -1) return;
                item = fixedSchedules.splice(index, 1)[0];
                schedules.push(item);
            }

            saveAll();
            renderSchedules();
            showNotification(`Berhasil dipindahkan ke ${to === 'fixed' ? 'Daftar Fix' : 'Riwayat Jadwal'}`);
        }

        // --- Form & List Management ---
        form.addEventListener('submit', function (e) {
            e.preventDefault();

            const hour = scheduleHour.value;
            const minute = scheduleMinute.value;

            if (!hour || !minute) {
                showNotification('Pilih jam dan menit terlebih dahulu!', true);
                return;
            }

            const newSchedule = {
                id: Date.now(),
                name: customerName.value,
                day: scheduleDay.value,
                time: `${hour}:${minute}`
            };

            schedules.push(newSchedule);
            saveAll();
            renderSchedules();
            showNotification('Jadwal berhasil disimpan!');
            form.reset();
        });

        function renderSchedules() {
            renderList('history');
            renderList('fixed');
        }

        function renderList(listType) {
            const isFixed = listType === 'fixed';
            const body = isFixed ? fixedBody : scheduleBody;
            const data = isFixed ? fixedSchedules : schedules;
            const empty = isFixed ? fixedEmptyState : emptyState;
            const filter = dayFilter.value;

            const dayOrder = {
                'Senin': 1, 'Selasa': 2, 'Rabu': 3, 'Kamis': 4,
                'Jumat': 5, 'Sabtu': 6, 'Minggu': 7
            };

            // Filter only applies to history
            let displayData = [...data];
            if (!isFixed && filter !== 'all') {
                displayData = displayData.filter(s => s.day === filter);
            }

            // Sort (Day -> Time)
            displayData.sort((a, b) => {
                if (dayOrder[a.day] !== dayOrder[b.day]) {
                    return dayOrder[a.day] - dayOrder[b.day];
                }
                return a.time.localeCompare(b.time);
            });

            body.innerHTML = '';
            
            if (displayData.length === 0) {
                empty.classList.add('active');
            } else {
                empty.classList.remove('active');
                displayData.forEach((s, index) => {
                    const row = document.createElement('tr');
                    row.draggable = true;
                    row.setAttribute('ondragstart', `handleDragStart(event, ${s.id}, '${listType}')`);
                    row.setAttribute('ondragend', `handleDragEnd(event)`);
                    
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td style="font-weight: 500;">${s.name}</td>
                        <td><span style="color: var(--primary-color); font-weight: 500;">${s.day}</span></td>
                        <td>${s.time}</td>
                        <td>
                            <button class="btn-delete" onclick="deleteItem(${s.id}, '${listType}')">Hapus</button>
                        </td>
                    `;
                    body.appendChild(row);
                });
            }
        }

        window.deleteItem = function (id, listType) {
            if (confirm('Apakah Anda yakin ingin menghapus jadwal ini?')) {
                if (listType === 'history') {
                    schedules = schedules.filter(s => s.id !== id);
                } else {
                    fixedSchedules = fixedSchedules.filter(s => s.id !== id);
                }
                saveAll();
                renderSchedules();
                showNotification('Data telah dihapus', true);
            }
        };

        function saveAll() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(schedules));
            localStorage.setItem(STORAGE_KEY_FIXED, JSON.stringify(fixedSchedules));
        }

        function showNotification(message, isError = false) {
            notifMessage.textContent = message;
            notification.classList.toggle('error', isError);
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 3000);
        }

        dayFilter.addEventListener('change', renderSchedules);

        // Run Init
        init();
    </script>
</body>
</html>
