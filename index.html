<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Jadwal Pijat </title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #e60000;
            --primary-hover: #cc0000;
            --primary-gradient: linear-gradient(135deg, #ff1a1a, #e60000);
            --bg-gradient: linear-gradient(180deg, #fff5f5 0%, #ffffff 100%);
            --white: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --shadow-soft: 0 10px 30px rgba(230, 0, 0, 0.05);
            --shadow-elevated: 0 15px 35px rgba(230, 0, 0, 0.1);
            --radius-lg: 20px;
            --radius-md: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 400;
        }

        /* Main Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
            align-items: start;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        @media (max-width: 1100px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .sidebar {
                order: 1;
            }
            .planner-section {
                order: 2;
            }
        }

        /* Card Styling */
        .card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
            border: 1px solid rgba(230, 0, 0, 0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-elevated);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1.5px solid #eee;
            background: #fafafa;
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(230, 0, 0, 0.1);
        }

        .form-control:read-only {
            background: #f1f1f1;
            cursor: not-allowed;
        }

        /* Button Styling */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--primary-gradient);
            color: var(--white);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(230, 0, 0, 0.3);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* Table Styling */
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-select {
            padding: 8px 15px;
            border-radius: 30px;
            border: 1.5px solid #eee;
            outline: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-select:focus {
            border-color: var(--primary-color);
        }

        .table-container {
            overflow-x: auto;
            border-radius: var(--radius-md);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #fdf2f2;
            padding: 15px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f5f5f5;
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #fffafa;
        }

        .btn-delete {
            background: #fff;
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-delete:hover {
            background: #ff4d4d;
            color: #fff;
        }

        .btn-confirm {
            background: #4caf50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-confirm:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .history-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mini-day-select {
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.8rem;
            outline: none;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }

        .empty-state.active {
            display: block;
        }

        .empty-state-icon {
            font-size: 3rem;
            color: #ddd;
            margin-bottom: 15px;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Notification Styling */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 15px 25px;
            border-radius: var(--radius-md);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.error {
            background: var(--primary-color);
        }

        /* Custom Time Picker Selects */
        .time-picker {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .time-picker select {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-md);
            border: 1.5px solid #eee;
            background: #fafafa;
            cursor: pointer;
            transition: var(--transition);
        }

        .time-picker select:focus {
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 4px rgba(230, 0, 0, 0.1);
        }

        .time-picker span {
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Drag and Drop Styles */
        tr[draggable="true"] {
            cursor: move;
            user-select: none;
        }

        .dragging {
            opacity: 0.5;
            background: #fdf2f2 !important;
            border: 2px dashed var(--primary-color);
        }

        .drop-zone-active {
            box-shadow: 0 0 15px rgba(230, 0, 0, 0.2);
            border: 2px dashed var(--primary-color) !important;
            transform: scale(1.02);
            transition: var(--transition);
        }

        .badge-fixed {
            background: #4caf50;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* Weekly Planner Grid */
        .weekly-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .day-box {
            background: #fcfcfc;
            border: 1px solid #eee;
            border-radius: var(--radius-md);
            min-height: 250px;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .day-box-header {
            padding: 10px 15px;
            background: #fdf2f2;
            border-bottom: 1px solid #eee;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .day-item-list {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .fixed-item {
            background: white;
            padding: 12px;
            border-radius: var(--radius-md);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 4px solid var(--primary-color);
            font-size: 0.85rem;
            position: relative;
            cursor: move;
            transition: var(--transition);
        }

        .fixed-item:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(230,0,0,0.1);
        }

        .fixed-item .name {
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }

        .fixed-item .time-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
        }

        .fixed-item .time-val {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }

        .fixed-item .time-val:hover {
            background: #e6e6e6;
            color: var(--primary-color);
        }

        .fixed-item .btn-mini-delete {
            opacity: 0;
            transition: opacity 0.2s;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .fixed-item:hover .btn-mini-delete {
            opacity: 1;
        }

        .day-box.drop-zone-active {
            background: #fdf2f2;
            border-color: var(--primary-color);
            border-style: dashed;
        }

        /* Inline Edit Input */
        .time-edit-container {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #fff;
            padding: 2px;
            border-radius: 6px;
            border: 1.5px solid var(--primary-color);
            box-shadow: 0 4px 12px rgba(230,0,0,0.15);
            z-index: 10;
        }

        .mini-select {
            padding: 2px 4px;
            border: 1px solid #eee;
            border-radius: 4px;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        .mini-select:focus {
            border-color: var(--primary-color);
        }

        .btn-mini-save {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-mini-save:hover {
            background: var(--primary-hover);
        }

        @media (max-width: 576px) {
            body {
                padding: 15px;
            }

            header h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 20px;
            }

            .table-header {
                flex-direction: column;
                align-items: stretch;
            }

            td,
            th {
                padding: 12px 10px;
                font-size: 0.85rem;
            }

            /* Force 2 columns on mobile for the weekly planner */
            .weekly-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .day-box {
                min-height: 200px;
            }

            .day-box-header {
                font-size: 0.8rem;
                padding: 8px 10px;
            }

            .fixed-item {
                padding: 8px;
                font-size: 0.75rem;
            }

            .time-val {
                padding: 1px 4px;
            }
        }
    </style>
</head>

<body>

    <div id="notification" class="notification">
        <span id="notif-message"></span>
    </div>

    <div class="container">
        <header>
            <h1>Jadwal Pijat</h1>
        </header>

        <main class="dashboard-grid">
            <div class="sidebar">
                <!-- Form Input Section -->
                <section class="card">
                    <h2 class="card-title">Input Jadwal Baru</h2>
                    <form id="scheduleForm">
                        <div class="form-group">
                            <label for="customerName">Nama Pelanggan</label>
                            <input type="text" id="customerName" class="form-control" placeholder="Masukkan nama"
                                required>
                        </div>
                        <div class="form-group">
                            <label for="scheduleDay">Pilih Hari</label>
                            <select id="scheduleDay" class="form-control" required>
                                <option value="" disabled selected>Pilih hari</option>
                                <option value="Senin">Senin</option>
                                <option value="Selasa">Selasa</option>
                                <option value="Rabu">Rabu</option>
                                <option value="Kamis">Kamis</option>
                                <option value="Jumat">Jumat</option>
                                <option value="Sabtu">Sabtu</option>
                                <option value="Minggu">Minggu</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Jam Pijit</label>
                            <div class="time-picker">
                                <select id="scheduleHour" class="form-control" required></select>
                                <span>:</span>
                                <select id="scheduleMinute" class="form-control" required></select>
                            </div>
                        </div>
                        <button type="submit" class="btn">
                            <span>Simpan Jadwal</span>
                        </button>
                    </form>
                </section>

                <!-- Riwayat Jadwal Section -->
                <section class="card drop-zone" id="historyDropZone" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'history')">
                    <div class="table-header">
                        <h2 class="card-title" style="margin-bottom: 0;">Riwayat</h2>
                        <select id="dayFilter" class="filter-select">
                            <option value="all">Semua</option>
                            <option value="Senin">Senin</option>
                            <option value="Selasa">Selasa</option>
                            <option value="Rabu">Rabu</option>
                            <option value="Kamis">Kamis</option>
                            <option value="Jumat">Jumat</option>
                            <option value="Sabtu">Sabtu</option>
                            <option value="Minggu">Minggu</option>
                        </select>
                    </div>

                    <div class="table-container">
                        <table id="scheduleTable">
                            <tbody id="scheduleBody">
                                <!-- Data injected here -->
                            </tbody>
                        </table>
                        <div id="emptyState" class="empty-state">
                            <p>Belum ada jadwal</p>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Daftar Fix Pijit Section (Weekly Planner) -->
            <section class="card planner-section">
                <div class="table-header">
                    <h2 class="card-title" style="margin-bottom: 0;">Daftar Fix Pijit (Weekly Planner)</h2>
                    <span class="badge-fixed">Confirmed Weekly</span>
                </div>

                <div class="weekly-grid" id="weeklyGrid">
                    <!-- 7 Day Boxes will be generated or mapped here -->
                    <div class="day-box" data-day="Senin" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'fixed', 'Senin')">
                        <div class="day-box-header">Senin <span class="count" id="count-Senin">0</span></div>
                        <div class="day-item-list" id="list-Senin"></div>
                    </div>
                    <div class="day-box" data-day="Selasa" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'fixed', 'Selasa')">
                        <div class="day-box-header">Selasa <span class="count" id="count-Selasa">0</span></div>
                        <div class="day-item-list" id="list-Selasa"></div>
                    </div>
                    <div class="day-box" data-day="Rabu" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'fixed', 'Rabu')">
                        <div class="day-box-header">Rabu <span class="count" id="count-Rabu">0</span></div>
                        <div class="day-item-list" id="list-Rabu"></div>
                    </div>
                    <div class="day-box" data-day="Kamis" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'fixed', 'Kamis')">
                        <div class="day-box-header">Kamis <span class="count" id="count-Kamis">0</span></div>
                        <div class="day-item-list" id="list-Kamis"></div>
                    </div>
                    <div class="day-box" data-day="Jumat" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'fixed', 'Jumat')">
                        <div class="day-box-header">Jumat <span class="count" id="count-Jumat">0</span></div>
                        <div class="day-item-list" id="list-Jumat"></div>
                    </div>
                    <div class="day-box" data-day="Sabtu" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'fixed', 'Sabtu')">
                        <div class="day-box-header">Sabtu <span class="count" id="count-Sabtu">0</span></div>
                        <div class="day-item-list" id="list-Sabtu"></div>
                    </div>
                    <div class="day-box" data-day="Minggu" ondragover="handleDragOver(event)" ondrop="handleDrop(event, 'fixed', 'Minggu')">
                        <div class="day-box-header">Minggu <span class="count" id="count-Minggu">0</span></div>
                        <div class="day-item-list" id="list-Minggu"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Constants & State
        const STORAGE_KEY = 'relaxation_schedules';
        const STORAGE_KEY_FIXED = 'relaxation_fixed_schedules';
        
        let schedules = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let fixedSchedules = JSON.parse(localStorage.getItem(STORAGE_KEY_FIXED)) || [];

        // DOM Elements
        const form = document.getElementById('scheduleForm');
        const customerName = document.getElementById('customerName');
        const scheduleDay = document.getElementById('scheduleDay');
        const scheduleHour = document.getElementById('scheduleHour');
        const scheduleMinute = document.getElementById('scheduleMinute');
        const scheduleBody = document.getElementById('scheduleBody');
        const emptyState = document.getElementById('emptyState');
        const dayFilter = document.getElementById('dayFilter');
        const notification = document.getElementById('notification');
        const notifMessage = document.getElementById('notif-message');

        const DAYS = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu', 'Minggu'];

        // Initialize App
        function init() {
            populateTimeSelects();
            autoCleanup();
            renderSchedules();
        }

        // Auto Cleanup Passed Days
        function autoCleanup() {
            const dayOrder = { 'Senin': 1, 'Selasa': 2, 'Rabu': 3, 'Kamis': 4, 'Jumat': 5, 'Sabtu': 6, 'Minggu': 7 };
            const today = new Date().getDay(); // 0 is Sunday, 1 is Monday...
            const todayOrder = today === 0 ? 7 : today; 

            // Move passed fixed schedules back to history (optional) or just delete
            // To be safe and keep data, we move them to history.
            const passed = fixedSchedules.filter(s => dayOrder[s.day] < todayOrder);
            if (passed.length > 0) {
                // Remove from fixed
                fixedSchedules = fixedSchedules.filter(s => dayOrder[s.day] >= todayOrder);
                // (Optional) Add to history? The user said "ilang" (gone).
                // Let's just remove them as per the word "ilang".
                saveAll();
                console.log(`Auto-cleaned ${passed.length} passed schedules.`);
            }
        }

        // Populate Hour and Minute Selects
        function populateTimeSelects() {
            for (let i = 0; i < 24; i++) {
                const hour = i.toString().padStart(2, '0');
                const option = document.createElement('option');
                option.value = hour;
                option.textContent = hour;
                scheduleHour.appendChild(option);
            }
            for (let i = 0; i < 60; i += 5) {
                const min = i.toString().padStart(2, '0');
                const option = document.createElement('option');
                option.value = min;
                option.textContent = min;
                scheduleMinute.appendChild(option);
            }
        }

        // --- Drag & Drop ---
        let draggedItemId = null;
        let sourceList = null;

        function handleDragStart(e, id, list) {
            draggedItemId = id;
            sourceList = list;
            e.target.classList.add('dragging');
            e.dataTransfer.setData('text/plain', id);
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.drop-zone, .day-box').forEach(c => c.classList.remove('drop-zone-active'));
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drop-zone-active');
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDrop(e, targetList, targetDay = null) {
            e.preventDefault();
            e.currentTarget.classList.remove('drop-zone-active');
            
            // If dropping in fixed, it MUST have a targetDay
            if (targetList === 'fixed' && !targetDay) {
                // If dropped on the card but not a specific box, fallback or ignore
                return; 
            }

            moveSchedule(draggedItemId, sourceList, targetList, targetDay);
        }

        function moveSchedule(id, from, to, targetDay) {
            let item;
            if (from === 'history') {
                const index = schedules.findIndex(s => s.id === id);
                if (index === -1) return;
                item = schedules.splice(index, 1)[0];
                if (to === 'fixed') {
                    item.day = targetDay;
                    fixedSchedules.push(item);
                } else {
                    schedules.push(item); // Should not happen but for safety
                }
            } else {
                const index = fixedSchedules.findIndex(s => s.id === id);
                if (index === -1) return;
                item = fixedSchedules.splice(index, 1)[0];
                if (to === 'history') {
                    schedules.push(item);
                } else {
                    // Moving between day boxes in fixed
                    item.day = targetDay;
                    fixedSchedules.push(item);
                }
            }

            saveAll();
            renderSchedules();
            showNotification(`Jadwal dipindahkan ke ${to === 'fixed' ? targetDay : 'Riwayat'}`);
        }

        // --- Form & Rendering ---
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            const hour = scheduleHour.value;
            const minute = scheduleMinute.value;

            if (!hour || !minute) return;

            const newSchedule = {
                id: Date.now(),
                name: customerName.value,
                day: scheduleDay.value,
                time: `${hour}:${minute}`
            };

            schedules.push(newSchedule);
            saveAll();
            renderSchedules();
            showNotification('Jadwal tersimpan di Riwayat.');
            form.reset();
        });

        function renderSchedules() {
            renderHistory();
            renderFixedPlanner();
        }

        function renderHistory() {
            const filter = dayFilter.value;
            let displayData = [...schedules];

            if (filter !== 'all') {
                displayData = displayData.filter(s => s.day === filter);
            }

            // Day order sorting
            const dayOrder = { 'Senin': 1, 'Selasa': 2, 'Rabu': 3, 'Kamis': 4, 'Jumat': 5, 'Sabtu': 6, 'Minggu': 7 };
            displayData.sort((a, b) => {
                if (dayOrder[a.day] !== dayOrder[b.day]) return dayOrder[a.day] - dayOrder[b.day];
                return a.time.localeCompare(b.time);
            });

            scheduleBody.innerHTML = '';
            if (displayData.length === 0) {
                emptyState.classList.add('active');
            } else {
                emptyState.classList.remove('active');
                displayData.forEach((s, idx) => {
                    const row = document.createElement('tr');
                    row.draggable = true;
                    row.setAttribute('ondragstart', `handleDragStart(event, ${s.id}, 'history')`);
                    row.setAttribute('ondragend', `handleDragEnd(event)`);
                    
                    let dayOptions = '';
                    DAYS.forEach(day => {
                        dayOptions += `<option value="${day}" ${day === s.day ? 'selected' : ''}>${day}</option>`;
                    });

                    row.innerHTML = `
                        <td>${idx + 1}</td>
                        <td style="font-weight: 500;">${s.name}</td>
                        <td style="font-size: 0.8rem; color: var(--text-muted);">${s.day}</td>
                        <td>${s.time}</td>
                        <td>
                            <div class="history-actions">
                                <select class="mini-day-select" id="sel-${s.id}">
                                    ${dayOptions}
                                </select>
                                <button class="btn-confirm" onclick="moveFromHistory(${s.id})">Fix</button>
                                <button class="btn-delete" onclick="deleteItem(${s.id}, 'history')">×</button>
                            </div>
                        </td>
                    `;
                    scheduleBody.appendChild(row);
                });
            }
        }

        window.moveFromHistory = function(id) {
            const select = document.getElementById(`sel-${id}`);
            const targetDay = select.value;
            moveSchedule(id, 'history', 'fixed', targetDay);
        };

        function renderFixedPlanner() {
            DAYS.forEach(day => {
                const listEl = document.getElementById(`list-${day}`);
                const countEl = document.getElementById(`count-${day}`);
                const dayItems = fixedSchedules.filter(s => s.day === day).sort((a, b) => a.time.localeCompare(b.time));

                listEl.innerHTML = '';
                countEl.textContent = dayItems.length;

                dayItems.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'fixed-item';
                    item.draggable = true;
                    item.setAttribute('ondragstart', `handleDragStart(event, ${s.id}, 'fixed')`);
                    item.setAttribute('ondragend', `handleDragEnd(event)`);
                    item.innerHTML = `
                        <span class="name">${s.name}</span>
                        <div class="time-row">
                            <span class="time-val" onclick="editTime(${s.id}, this)">${s.time}</span>
                            <span class="btn-mini-delete" onclick="deleteItem(${s.id}, 'fixed')">🗑</span>
                        </div>
                    `;
                    listEl.appendChild(item);
                });
            });
        }

        window.editTime = function (id, element) {
            if (element.querySelector('.time-edit-container')) return;

            const originalTime = element.textContent;
            const [h, m] = originalTime.split(':');

            let hourOptions = '';
            for (let i = 0; i < 24; i++) {
                const val = i.toString().padStart(2, '0');
                hourOptions += `<option value="${val}" ${val === h ? 'selected' : ''}>${val}</option>`;
            }

            let minOptions = '';
            for (let i = 0; i < 60; i += 5) {
                const val = i.toString().padStart(2, '0');
                minOptions += `<option value="${val}" ${val === m ? 'selected' : ''}>${val}</option>`;
            }

            element.innerHTML = `
                <div class="time-edit-container" onclick="event.stopPropagation()">
                    <select class="mini-select s-hour">${hourOptions}</select>
                    <span>:</span>
                    <select class="mini-select s-min">${minOptions}</select>
                    <button class="btn-mini-save" onclick="saveInlineTime(${id}, this.parentElement)">✓</button>
                    <button class="btn-mini-save" style="background:#ccc;" onclick="renderSchedules()">×</button>
                </div>
            `;
        };

        function saveInlineTime(id, container) {
            const h = container.querySelector('.s-hour').value;
            const m = container.querySelector('.s-min').value;
            const newValue = `${h}:${m}`;

            const item = fixedSchedules.find(s => s.id === id);
            if (item) {
                item.time = newValue;
                saveAll();
                showNotification('Jam diperbarui.');
            }
            
            renderSchedules();
        }

        window.deleteItem = function (id, list) {
            if (confirm('Hapus jadwal?')) {
                if (list === 'history') schedules = schedules.filter(s => s.id !== id);
                else fixedSchedules = fixedSchedules.filter(s => s.id !== id);
                saveAll();
                renderSchedules();
            }
        };

        function saveAll() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(schedules));
            localStorage.setItem(STORAGE_KEY_FIXED, JSON.stringify(fixedSchedules));
        }

        function showNotification(msg, isError = false) {
            notifMessage.textContent = msg;
            notification.className = `notification ${isError ? 'error' : ''} show`;
            setTimeout(() => notification.classList.remove('show'), 3000);
        }

        dayFilter.addEventListener('change', renderHistory);
        init();
    </script>
</body>
</html>
